    needs: resolve
    if: needs.resolve.outputs.package_exists != 'true'
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Build freebsd-arm64
        uses: vmactions/freebsd-vm@v1
        with:
          release: "14.4"
          arch: aarch64
          sync: rsync
          usesh: true
          run: |
            set -e

            fetch_sqlite() {
              code="$1"
              year="$2"
              mkdir -p sqlite-src
              url="https://www.sqlite.org/${year}/sqlite-amalgamation-${code}.zip"
              fetch -o sqlite.zip "$url"
              tar -xf sqlite.zip -C sqlite-src
            }

            fetch_sqlite "${{ needs.resolve.outputs.sqlite_code }}" "${{ needs.resolve.outputs.sqlite_year }}"
            srcdir="$(find sqlite-src -maxdepth 1 -type d -name 'sqlite-amalgamation-*' | head -n1)"

            mkdir -p out/runtimes/freebsd-arm64/native

            cc -shared -fPIC -O2 \
              -DSQLITE_THREADSAFE=1 \
              -DSQLITE_ENABLE_FTS5 \
              -DSQLITE_ENABLE_RTREE \
              -DSQLITE_ENABLE_JSON1 \
              -DSQLITE_ENABLE_COLUMN_METADATA \
              -DSQLITE_USE_URI=1 \
              -o out/runtimes/freebsd-arm64/native/libe_sqlite3.so \
              "$srcdir/sqlite3.c" -lpthread

            nm -g out/runtimes/freebsd-arm64/native/libe_sqlite3.so | grep 'sqlite3_open'
            nm -g out/runtimes/freebsd-arm64/native/libe_sqlite3.so | grep 'sqlite3_prepare_v2'
            nm -g out/runtimes/freebsd-arm64/native/libe_sqlite3.so | grep 'sqlite3_close'

            tar -C out -czf native-freebsd-arm64.tar.gz .

      - name: Upload temporary asset
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl -fsSL \
            -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Content-Type: application/gzip" \
            --data-binary @native-freebsd-arm64.tar.gz \
            "https://uploads.github.com/repos/${GITHUB_REPOSITORY}/releases/${{ needs.resolve.outputs.release_id }}/assets?name=native-freebsd-arm64.tar.gz"

