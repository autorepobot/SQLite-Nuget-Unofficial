          file out/runtimes/linux-x86/native/libe_sqlite3.so
          nm -D out/runtimes/linux-x86/native/libe_sqlite3.so | grep ' sqlite3_open'

          tar -C out -czf native-linux-x86.tar.gz .

      - name: Upload temporary asset
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl -fsSL \
            -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Content-Type: application/gzip" \
            --data-binary @native-linux-x86.tar.gz \
            "https://uploads.github.com/repos/${GITHUB_REPOSITORY}/releases/${{ needs.resolve.outputs.release_id }}/assets?name=native-linux-x86.tar.gz"

  build-linux-ppc64:
