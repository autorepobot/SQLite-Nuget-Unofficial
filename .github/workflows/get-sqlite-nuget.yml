            -DSQLITE_ENABLE_FTS5 \
            -DSQLITE_ENABLE_RTREE \
            -DSQLITE_ENABLE_JSON1 \
            -DSQLITE_ENABLE_COLUMN_METADATA \
            -DSQLITE_USE_URI=1 \
            -o out/runtimes/linux-riscv64/native/libe_sqlite3.so \
