  pack-and-publish:
    needs:
      - resolve
      - build-linux-x64
      - build-linux-x86
      - build-linux-arm64
      - build-linux-riscv64
      - build-linux-loongarch64
      - build-linux-ppc64
      - build-linux-ppc64le
      - build-linux-s390x
      - build-linux-sparc64
      - build-linux-arm
      - build-linux-armel
      - build-linux-m68k
      - build-linux-mips64
      - build-linux-mips64le
      - build-linux-musl-arm
      - build-linux-musl-x64
      - build-linux-musl-arm64
      - build-linux-musl-riscv64
      - build-linux-musl-s390x
      - build-freebsd-x64
      - build-freebsd-arm64
      - build-freebsd-riscv64
      - build-macos-x64
      - build-macos-arm64
      - build-maccatalyst-arm64
      - build-maccatalyst-x64
      - build-iossimulator-arm64
      - build-iossimulator-x64
      - build-iossimulator-x86
      - build-ios-arm
      - build-ios-arm64
      - build-android-x86
      - build-android-x64
      - build-android-arm64
      - build-android-arm
      - build-browser-wasm
      - build-windows-x64
      - build-windows-arm64
      - build-windows-x86
    if: needs.resolve.outputs.package_exists != 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Download temporary assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          mkdir -p assets package

          api="https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/${{ needs.resolve.outputs.release_id }}/assets?per_page=100"
          curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "$api" > assets.json

          python3 - <<'PY'
          import json, subprocess, os
          data=json.load(open("assets.json"))
          os.makedirs("assets", exist_ok=True)
          for a in data:
              name=a["name"]
              url=a["url"]
              subprocess.check_call([
                  "curl","-fsSL",
                  "-H",f"Authorization: Bearer {os.environ['GH_TOKEN']}",
                  "-H","Accept: application/octet-stream",
                  "-o",f"assets/{name}",
                  url
              ])
          PY

          for f in assets/*.tar.gz; do
            [ -e "$f" ] || continue
            tar -C package -xzf "$f"
          done

          for f in assets/*.zip; do
            [ -e "$f" ] || continue
            python3 - "$f" <<'PY'
          import sys, zipfile, pathlib

          zip_path = sys.argv[1]
          out_dir = pathlib.Path("package")

          with zipfile.ZipFile(zip_path) as z:
              for info in z.infolist():
                  name = info.filename.replace("\\", "/")
                  if name.endswith("/"):
                      continue
                  target = out_dir / name
                  target.parent.mkdir(parents=True, exist_ok=True)
                  with z.open(info) as src, open(target, "wb") as dst:
                      dst.write(src.read())
          PY
          done

      - name: Create package files
        shell: bash
        run: |
          set -euo pipefail

          cat > package/README.md <<'EOF'
          # Repobot.SQLite.Unofficial

          Unofficial SQLite native runtime package for .NET.

          This package is automatically built from upstream SQLite source using GitHub Actions.

          - Not affiliated with SQLite.org
          - No warranty
          - No support commitment
          - Use at your own risk
          EOF

          cat > package/${{ env.PACKAGE_ID }}.nuspec <<EOF
          <?xml version="1.0"?>
          <package>
            <metadata>
              <id>${{ env.PACKAGE_ID }}</id>
              <version>${{ needs.resolve.outputs.package_version }}</version>
              <authors>Repobot</authors>
              <owners>Repobot</owners>
              <license type="expression">Unlicense</license>
              <projectUrl>https://github.com/${{ github.repository }}</projectUrl>
              <repository type="git" url="https://github.com/${{ github.repository }}" />
              <description>Unofficial SQLite native runtime package for .NET. Not affiliated with SQLite.org.</description>
              <tags>sqlite sqlite3 native e_sqlite3 unofficial</tags>
              <readme>README.md</readme>
            </metadata>
            <files>
              <file src="README.md" target="" />
              <file src="runtimes/**" target="runtimes" />
            </files>
          </package>
          EOF

      - name: Install NuGet
        shell: bash
        run: |
          set -euo pipefail
          curl -fL https://dist.nuget.org/win-x86-commandline/latest/nuget.exe -o nuget.exe
          sudo apt-get update
          sudo apt-get install -y mono-complete

      - name: Pack
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          mono nuget.exe pack "package/${{ env.PACKAGE_ID }}.nuspec" -OutputDirectory artifacts

      - name: Publish to NuGet.org
        shell: bash
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          set -euo pipefail
          dotnet nuget push "artifacts/*.nupkg" \
            --source "https://api.nuget.org/v3/index.json" \
            --api-key "$NUGET_API_KEY" \
            --skip-duplicate

      - name: Delete temporary release
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          curl -fsSL \
            -X DELETE \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/${{ needs.resolve.outputs.release_id }}"

          curl -fsSL \
            -X DELETE \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/git/refs/tags/${{ needs.resolve.outputs.temp_tag }}"

          exit 0
