  build-linux-sparc64:
    needs: resolve
    if: needs.resolve.outputs.package_exists != 'true'
    runs-on: ubuntu-24.04
    container:
      image: debian:sid
    steps:
      - name: Build linux-sparc64
        shell: bash
        run: |
          set -euo pipefail

          apt-get update
          apt-get install -y \
            ca-certificates \
            curl \
            unzip \
            file \
            gcc-sparc64-linux-gnu \
            binutils-sparc64-linux-gnu \
            libc6-dev-sparc64-cross

          mkdir -p sqlite-src out/runtimes/linux-sparc64/native

          curl -fL \
            "https://www.sqlite.org/${{ needs.resolve.outputs.sqlite_year }}/sqlite-amalgamation-${{ needs.resolve.outputs.sqlite_code }}.zip" \
            -o sqlite.zip

          unzip -q sqlite.zip -d sqlite-src
          srcdir="$(find sqlite-src -maxdepth 1 -type d -name 'sqlite-amalgamation-*' | head -n1)"

          sparc64-linux-gnu-gcc -shared -fPIC -O2 \
            -DSQLITE_THREADSAFE=1 \
            -DSQLITE_ENABLE_FTS5 \
            -DSQLITE_ENABLE_RTREE \
            -DSQLITE_ENABLE_JSON1 \
            -DSQLITE_ENABLE_COLUMN_METADATA \
            -DSQLITE_USE_URI=1 \
            -o out/runtimes/linux-sparc64/native/libe_sqlite3.so \
            "$srcdir/sqlite3.c" -ldl -lpthread

          file out/runtimes/linux-sparc64/native/libe_sqlite3.so
          sparc64-linux-gnu-readelf -h out/runtimes/linux-sparc64/native/libe_sqlite3.so
          sparc64-linux-gnu-nm -D out/runtimes/linux-sparc64/native/libe_sqlite3.so | grep ' sqlite3_open'

          tar -C out -czf native-linux-sparc64.tar.gz .

      - name: Upload temporary asset
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl -fsSL \
            -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Content-Type: application/gzip" \
            --data-binary @native-linux-sparc64.tar.gz \
            "https://uploads.github.com/repos/${GITHUB_REPOSITORY}/releases/${{ needs.resolve.outputs.release_id }}/assets?name=native-linux-sparc64.tar.gz"

  build-linux-loongarch64:
    needs: resolve
    if: needs.resolve.outputs.package_exists != 'true'
    runs-on: ubuntu-24.04
    container:
      image: debian:sid
    steps:
      - name: Build linux-loongarch64
        shell: bash
        run: |
          set -euo pipefail

          fetch_sqlite() {
            local code="$1"
            local year="$2"
            mkdir -p sqlite-src
            url="https://www.sqlite.org/${year}/sqlite-amalgamation-${code}.zip"
            curl -fL "$url" -o sqlite.zip
            unzip -q sqlite.zip -d sqlite-src
          }

          apt-get update
          apt-get install -y \
            ca-certificates \
            curl \
            unzip \
            file \
            gcc-loongarch64-linux-gnu \
            binutils-loongarch64-linux-gnu \
            libc6-dev-loong64-cross

          fetch_sqlite "${{ needs.resolve.outputs.sqlite_code }}" "${{ needs.resolve.outputs.sqlite_year }}"
          srcdir="$(find sqlite-src -maxdepth 1 -type d -name 'sqlite-amalgamation-*' | head -n1)"

          mkdir -p out/runtimes/linux-loongarch64/native

          loongarch64-linux-gnu-gcc -shared -fPIC -O2 \
            -DSQLITE_THREADSAFE=1 \
            -DSQLITE_ENABLE_FTS5 \
            -DSQLITE_ENABLE_RTREE \
            -DSQLITE_ENABLE_JSON1 \
            -DSQLITE_ENABLE_COLUMN_METADATA \
            -DSQLITE_USE_URI=1 \
            -o out/runtimes/linux-loongarch64/native/libe_sqlite3.so \
            "$srcdir/sqlite3.c" -ldl -lpthread

          file out/runtimes/linux-loongarch64/native/libe_sqlite3.so
          loongarch64-linux-gnu-readelf -h out/runtimes/linux-loongarch64/native/libe_sqlite3.so

          flags="$(loongarch64-linux-gnu-readelf -h out/runtimes/linux-loongarch64/native/libe_sqlite3.so | grep 'Flags:')"
          echo "$flags"

          if ! echo "$flags" | grep -q 'OBJ-v1'; then
            echo "Not a LoongArch new-world OBJ-v1 binary" >&2
            exit 1
          fi

          loongarch64-linux-gnu-nm -D out/runtimes/linux-loongarch64/native/libe_sqlite3.so | grep ' sqlite3_open'

          tar -C out -czf native-linux-loongarch64.tar.gz .

      - name: Upload temporary asset
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl -fsSL \
            -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Content-Type: application/gzip" \
            --data-binary @native-linux-loongarch64.tar.gz \
            "https://uploads.github.com/repos/${GITHUB_REPOSITORY}/releases/${{ needs.resolve.outputs.release_id }}/assets?name=native-linux-loongarch64.tar.gz"

  build-linux-x86:
    needs: resolve
    if: needs.resolve.outputs.package_exists != 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Build linux-x86
        shell: bash
        run: |
          set -euo pipefail

          fetch_sqlite() {
            local code="$1"
            local year="$2"
            mkdir -p sqlite-src
            url="https://www.sqlite.org/${year}/sqlite-amalgamation-${code}.zip"
            curl -fL "$url" -o sqlite.zip
            unzip -q sqlite.zip -d sqlite-src
          }

          sudo apt-get update
          sudo apt-get install -y gcc gcc-multilib curl unzip file

          fetch_sqlite "${{ needs.resolve.outputs.sqlite_code }}" "${{ needs.resolve.outputs.sqlite_year }}"
          srcdir="$(find sqlite-src -maxdepth 1 -type d -name 'sqlite-amalgamation-*' | head -n1)"

          mkdir -p out/runtimes/linux-x86/native

          gcc -m32 -shared -fPIC -O2 \
            -DSQLITE_THREADSAFE=1 \
            -DSQLITE_ENABLE_FTS5 \
            -DSQLITE_ENABLE_RTREE \
            -DSQLITE_ENABLE_JSON1 \
            -DSQLITE_ENABLE_COLUMN_METADATA \
            -DSQLITE_USE_URI=1 \
            -o out/runtimes/linux-x86/native/libe_sqlite3.so \
