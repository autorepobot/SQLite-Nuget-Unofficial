name: get sqlite nuget

on:
  workflow_dispatch:
    inputs:
      sqlite_version:
        description: "SQLite version: 3.53.0, v3.53.0, or version-3.53.0. Empty = latest"
        required: false
        type: string
      package_type:
        description: "Package version type"
        required: true
        type: choice
        default: release
        options:
          - release
          - preview
          - revision
      package_revision:
        description: "Preview/revision number, e.g. 1"
        required: false
        type: string
        default: "1"
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: write
  id-token: write

env:
  PACKAGE_ID: Repobot.SQLite.Unofficial

jobs:
  resolve:
    runs-on: ubuntu-24.04
    outputs:
      sqlite_version: ${{ steps.resolve.outputs.sqlite_version }}
      sqlite_tag: ${{ steps.resolve.outputs.sqlite_tag }}
      sqlite_code: ${{ steps.resolve.outputs.sqlite_code }}
      sqlite_year: ${{ steps.resolve.outputs.sqlite_year }}
      package_version: ${{ steps.resolve.outputs.package_version }}
      package_exists: ${{ steps.exists.outputs.package_exists }}
      release_id: ${{ steps.release.outputs.release_id }}
      temp_tag: ${{ steps.release.outputs.temp_tag }}
    steps:
      - name: Resolve SQLite version
        id: resolve
        shell: bash
        env:
          SQLITE_VERSION_INPUT: ${{ inputs.sqlite_version || '' }}
          PACKAGE_TYPE: ${{ inputs.package_type || 'release' }}
          PACKAGE_REVISION: ${{ inputs.package_revision || '1' }}
        run: |
          set -euo pipefail

          input="${SQLITE_VERSION_INPUT}"

          if [ -n "$input" ]; then
            ver="$input"
            ver="${ver#version-}"
            ver="${ver#v}"
            ver="${ver#V}"
          else
            ver="$(curl -fsSL https://api.github.com/repos/sqlite/sqlite/tags \
              | python3 -c '
          import json,sys,re
          tags=json.load(sys.stdin)
          vals=[]
          for t in tags:
              name=t.get("name","")
              m=re.fullmatch(r"version-(\d+\.\d+\.\d+)", name)
              if m:
                  vals.append(tuple(map(int,m.group(1).split("."))))
          vals.sort()
          print(".".join(map(str, vals[-1])))
          ')"
          fi

          if ! echo "$ver" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Invalid SQLite version: $ver" >&2
            exit 1
          fi

          IFS=. read -r major minor patch <<< "$ver"
          code="$(printf "%d%02d%02d00" "$major" "$minor" "$patch")"
          tag="version-$ver"

          tag_ref="$(curl -fsSL "https://api.github.com/repos/sqlite/sqlite/git/ref/tags/${tag}")"
          tag_obj_url="$(echo "$tag_ref" | python3 -c 'import json,sys; print(json.load(sys.stdin).get("object",{}).get("url",""))')"

          [ -n "$tag_obj_url" ] || { echo "Failed to resolve SQLite tag object URL" >&2; echo "$tag_ref" >&2; exit 1; }

          tag_obj="$(curl -fsSL "$tag_obj_url")"
          year="$(echo "$tag_obj" | python3 -c '
          import json,sys
          data=json.load(sys.stdin)
          date=data.get("tagger",{}).get("date","") or data.get("committer",{}).get("date","")
          print(date[:4])
          ')"

          if ! echo "$year" | grep -Eq '^[0-9]{4}$'; then
            echo "Failed to resolve SQLite release year" >&2
            echo "$tag_obj" >&2
            exit 1
          fi

          package_type="${PACKAGE_TYPE}"
          package_revision="${PACKAGE_REVISION}"

          if ! echo "$package_revision" | grep -Eq '^[0-9]+$'; then
            echo "Invalid package revision: $package_revision" >&2
            exit 1
          fi

          case "$package_type" in
            release)
              package_version="$ver"
              ;;
            preview)
              package_version="${ver}-preview.${package_revision}"
              ;;
            revision)
              package_version="${ver}.${package_revision}"
              ;;
            *)
              echo "Invalid package type: $package_type" >&2
              exit 1
              ;;
          esac

          echo "sqlite_version=$ver" >> "$GITHUB_OUTPUT"
          echo "sqlite_tag=$tag" >> "$GITHUB_OUTPUT"
          echo "sqlite_code=$code" >> "$GITHUB_OUTPUT"
          echo "sqlite_year=$year" >> "$GITHUB_OUTPUT"
          echo "package_version=$package_version" >> "$GITHUB_OUTPUT"

      - name: Check NuGet duplicate
        id: exists
        shell: bash
        run: |
          set -euo pipefail

          id_lower="$(echo '${{ env.PACKAGE_ID }}' | tr '[:upper:]' '[:lower:]')"
          ver="${{ steps.resolve.outputs.package_version }}"
          url="https://api.nuget.org/v3-flatcontainer/${id_lower}/index.json"

          if curl -fsSL "$url" | VER="$ver" python3 -c '
          import json,sys,os
          ver=os.environ["VER"].lower()
          try:
              data=json.load(sys.stdin)
              sys.exit(0 if ver in [v.lower() for v in data.get("versions",[])] else 1)
          except Exception:
              sys.exit(1)
          '; then
            echo "Package ${{ env.PACKAGE_ID }} $ver already exists on NuGet."
            echo "package_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "package_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create temporary release
        id: release
        if: steps.exists.outputs.package_exists != 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          tag="temp-sqlite-nuget-${GITHUB_RUN_ID}"
          body="Temporary assets for SQLite NuGet build ${GITHUB_RUN_ID}"

          response="$(curl -fsSL \
            -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases" \
            -d "{\"tag_name\":\"${tag}\",\"name\":\"${tag}\",\"body\":\"${body}\",\"draft\":true,\"prerelease\":true}")"

          release_id="$(echo "$response" | python3 -c 'import json,sys; print(json.load(sys.stdin).get("id",""))')"

          [ -n "$release_id" ] || { echo "Failed to get release_id" >&2; echo "$response" >&2; exit 1; }

          echo "temp_tag=$tag" >> "$GITHUB_OUTPUT"
          echo "release_id=$release_id" >> "$GITHUB_OUTPUT"

  build-linux-x64:
    needs: resolve
    if: needs.resolve.outputs.package_exists != 'true'
    runs-on: ubuntu-24.04
    container:
      image: registry.access.redhat.com/ubi10/ubi
    steps:
      - name: Build linux-x64
        shell: bash
        run: |
          set -euo pipefail

          fetch_sqlite() {
            local code="$1"
            local year="$2"
            mkdir -p sqlite-src
            url="https://www.sqlite.org/${year}/sqlite-amalgamation-${code}.zip"
            curl -fL "$url" -o sqlite.zip
            unzip -q sqlite.zip -d sqlite-src
          }

          dnf update -y
          dnf install -y gcc curl unzip tar gzip

          fetch_sqlite "${{ needs.resolve.outputs.sqlite_code }}" "${{ needs.resolve.outputs.sqlite_year }}"
          srcdir="$(find sqlite-src -maxdepth 1 -type d -name 'sqlite-amalgamation-*' | head -n1)"

          mkdir -p out/runtimes/linux-x64/native

          gcc -shared -fPIC -O2 \
            -DSQLITE_THREADSAFE=1 \
            -DSQLITE_ENABLE_FTS5 \
            -DSQLITE_ENABLE_RTREE \
            -DSQLITE_ENABLE_JSON1 \
            -DSQLITE_ENABLE_COLUMN_METADATA \
            -DSQLITE_USE_URI=1 \
            -o out/runtimes/linux-x64/native/libe_sqlite3.so \
            "$srcdir/sqlite3.c" -ldl -lpthread

          tar -C out -czf native-linux-x64.tar.gz .

      - name: Upload temporary asset
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl -fsSL \
            -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Content-Type: application/gzip" \
            --data-binary @native-linux-x64.tar.gz \
            "https://uploads.github.com/repos/${GITHUB_REPOSITORY}/releases/${{ needs.resolve.outputs.release_id }}/assets?name=native-linux-x64.tar.gz"

  build-linux-arm64:
    needs: resolve
    if: needs.resolve.outputs.package_exists != 'true'
    runs-on: ubuntu-24.04-arm
    container:
      image: registry.access.redhat.com/ubi10/ubi
    steps:
      - name: Build linux-arm64
        shell: bash
        run: |
          set -euo pipefail

          fetch_sqlite() {
            local code="$1"
            local year="$2"
            mkdir -p sqlite-src
            url="https://www.sqlite.org/${year}/sqlite-amalgamation-${code}.zip"
