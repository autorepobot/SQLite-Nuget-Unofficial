          file out/runtimes/linux-ppc64/native/libe_sqlite3.so
          powerpc64-linux-gnu-readelf -h out/runtimes/linux-ppc64/native/libe_sqlite3.so
          powerpc64-linux-gnu-nm -D out/runtimes/linux-ppc64/native/libe_sqlite3.so | grep ' sqlite3_open'

          tar -C out -czf native-linux-ppc64.tar.gz .

      - name: Upload temporary asset
